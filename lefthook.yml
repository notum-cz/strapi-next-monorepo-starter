colors: false
no_tty: true
output:
  - execution_out

pre-commit:
  jobs:
    - name: validate branch name
      skip:
        - merge
      run: sh ./scripts/validate-branch-name.sh

    - name: lint staged files
      skip:
        - merge
      run: sh ./scripts/lint-staged-readable.sh

commit-msg:
  jobs:
    - name: validate commit message
      skip:
        - merge
      run: sh ./scripts/commitlint-readable.sh {1}
