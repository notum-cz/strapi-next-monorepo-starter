name: 🐛 Bug report
title: "bug:"
description: "Create new ticket for a bug report"
labels: ["bug"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: "Description of the bug"
      description: Please enter an explicit description of your issue
      placeholder: Short and explicit description of your incident...
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: "Reproduction URL"
      description: Please insert the URL of the application where the problem is reproducible.
      placeholder: https://...
  - type: textarea
    id: reproduce
    attributes:
      label: "Steps to reproduce"
      description: Please enter explicit steps to reproduce the issue.
      value: |
        1.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      description: What actually happens?
  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
      description: A clear and concise description of what you expected to happen.
  - type: textarea
    id: screenshot
    attributes:
      label: "Screenshots / Video-record"
      description: If applicable, add screenshots/video-record to help explain your problem.
  - type: textarea
    id: logs
    attributes:
      label: "Logs"
      description: Please copy and paste relevant log output (browser console, Strapi logs, Next.js server logs, etc.).
      render: shell
  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      description: How severe is the issue?
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: "Area"
      description: Which part of the application is affected?
      multiple: true
      options:
        - Frontend (Next.js)
        - Backend (Strapi)
        - API / Integration
        - CI/CD / Build
        - Other
  - type: dropdown
    id: env
    attributes:
      label: "Environment"
      description: In which environment does this bug occur?
      multiple: true
      options:
        - Development
        - Staging
        - Production
  - type: dropdown
    id: browsers
    attributes:
      label: "Browsers"
      description: What browsers are you seeing the problem on?
      multiple: true
      options:
        - Chrome
        - Microsoft Edge
        - Safari
        - Firefox
        - Other
  - type: dropdown
    id: device
    attributes:
      label: "Device"
      description: What device are you seeing the problem on?
      multiple: true
      options:
        - Desktop
        - Tablet
        - Mobile
